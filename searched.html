<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinebase</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=account_circle" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100..900;1,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/searched.css">
    <script defer src="js/controllers/searchedController.js" type="module"></script>
</head>
<body>
    <header class="header">
    <nav class="main-nav">
        <div class="nav__brand">
            <a href="index.html">
            <img src="img/logo.png" alt="Cinebase logo" class="nav__logo" title="Back to main page">
            </a>
        </div>
        <div class="nav__profile">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" class="nav__profile-icon"><path d="M234-276q51-39 114-61.5T480-360q69 0 132 22.5T726-276q35-41 54.5-93T800-480q0-133-93.5-226.5T480-800q-133 0-226.5 93.5T160-480q0 59 19.5 111t54.5 93Zm146.5-204.5Q340-521 340-580t40.5-99.5Q421-720 480-720t99.5 40.5Q620-639 620-580t-40.5 99.5Q539-440 480-440t-99.5-40.5ZM480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm100-95.5q47-15.5 86-44.5-39-29-86-44.5T480-280q-53 0-100 15.5T294-220q39 29 86 44.5T480-160q53 0 100-15.5ZM523-537q17-17 17-43t-17-43q-17-17-43-17t-43 17q-17 17-17 43t17 43q17 17 43 17t43-17Zm-43-43Zm0 360Z"/></svg>
        </div>

        <form class="nav__search">
            <div class="nav__search-box">
            <div class="nav__input-box">
            <input type="text" class="nav__search-input" placeholder="Szukaj filmów" aria-label="Szukaj filmów">
            <ul class="autocompletion__list hidden">
                
            </ul>
            </div>
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" class="nav__search-icon"><path d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"/></svg>
            </div>
        </form>
    </nav>
    </header>

    <main class="main">
        <section class="movies" id="movies">

            <div class="movies__aside">
             <form class="filters hidden">
    <h3 class="filters__title">
        <svg class="filters__logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960">
            <path d="M400-240v-80h160v80H400ZM240-440v-80h480v80H240ZM120-640v-80h720v80H120Z"/>
        </svg>
        Filters
    </h3>

    <div class="filters__content">

        <fieldset class="filters__group">
            <legend class="filters__sub-title">Minimum rating</legend>

            <div class="filters__select filters__select--rating">
                <div class="rating__item">
                    <input class="rating__radio" type="radio" id="exceptional" name="rating" value="8">
                    <label for="exceptional" class="rating__label">8.0+ Exceptional</label>
                </div>

                <div class="rating__item">
                    <input class="rating__radio" type="radio" id="recommended" name="rating" value="7">
                    <label for="recommended" class="rating__label">7.0+ Recommended</label>
                </div>

                <div class="rating__item">
                    <input class="rating__radio" type="radio" id="average" name="rating" value="5">
                    <label for="average" class="rating__label">5.0+ Average</label>
                </div>
            </div>
        </fieldset>


        <fieldset class="filters__group">
            <legend class="filters__sub-title">Genre</legend>

            <ul class="filters__select filters__select--genre">
                
            </ul>
        </fieldset>


        <fieldset class="filters__group">
            <legend class="filters__sub-title">Relase Year</legend>

            <div class="year__hint-box">
                <span class="year__text year__from">1970</span>
                <span class="year__text year__selected">1998</span>
                <span class="year__text year__to">2026</span>
            </div>
            <input class="year__input" type="range" min="1970" max="2026">
        </fieldset>


        <button type="reset" class="filters__reset-btn">
            Reset all filters
        </button>

    </div>
</form>
            </div>

            <div class="movies__main">

            <h2 class="movies__title">Searched results for <span class="movie__query"></span></h2>
                <p class="movies__search-description">Found <span class="movies__search-matches"></span> matches</p>

                <div class="movies__grid movies__grid--results">
                    
                    <div class="loader-overlay">
                        <div class="loader off"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <nav class="footer-nav" aria-label="footer nav">
            <ul class="nav-bottom">
                <div class="nav-bottom__icons">
                    <li class="nav-bottom__icon"><svg class="nav-bottom__logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"  fill="currentColor" aria-label="Facebook"> <path d="M22 12A10 10 0 1 0 10.44 21.87v-6.99H7.9V12h2.54V9.8c0-2.5 1.49-3.88 3.77-3.88 1.09 0 2.23.19 2.23.19v2.46h-1.26c-1.24 0-1.63.77-1.63 1.56V12h2.77l-.44 2.88h-2.33v6.99A10 10 0 0 0 22 12z"/></svg></li>
                    <li class="nav-bottom__icon"><svg class="nav-bottom__logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"  fill="currentColor" aria-label="Instagram"><path d="M7.75 2C4.57 2 2 4.57 2 7.75v8.5C2 19.43 4.57 22 7.75 22h8.5C19.43 22 22 19.43 22 16.25v-8.5C22 4.57 19.43 2 16.25 2h-8.5zm0 2h8.5A3.75 3.75 0 0 1 20 7.75v8.5A3.75 3.75 0 0 1 16.25 20h-8.5A3.75 3.75 0 0 1 4 16.25v-8.5A3.75 3.75 0 0 1 7.75 4zm9.5 1a1.25 1.25 0 1 0 0 2.5 1.25 1.25 0 0 0 0-2.5zM12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/></svg></li>
                </div>
                <div class="nav-bottom__links">
                    <li class="nav-bottom__item"><a href="#" class="nav-bottom__link">Terms</a></li>
                    <li class="nav-bottom__item"><a href="#" class="nav-bottom__link">Privacy</a></li>
                    <li class="nav-bottom__item"><a href="#" class="nav-bottom__link">Contact</a></li>
                </div>
            </ul>
            <p class="copyright">Cinebase 2026 &copy;. All rights reserved.</p>

        </nav>
    </footer>
</body>
</html>
